backend:
  name: github
  repo: bluee124/Debre-Hail
  branch: main
  # base_url and auth_endpoint point at the OAuth proxy deployed per
  # admin/README.md (sterlingwes/decap-proxy, run as a Cloudflare Worker).
  base_url: https://decap-proxy3.beruhtesfaye-gedefa.workers.dev
  auth_endpoint: auth

media_folder: "images/gallery"
public_folder: "images/gallery"

locale: "sv"

collections:
  - name: "news"
    label: "Nyheter"
    files:
      - name: "news"
        label: "Nyhetsartiklar"
        file: "content/news.json"
        fields:
          - name: "items"
            label: "Artiklar"
            widget: "list"
            summary: "{{title_sv}} — {{date_sv}}"
            fields:
              - { name: "id", label: "ID (unikt, t.ex. article-5)", widget: "string" }
              - { name: "date_sv", label: "Datum (svenska)", widget: "string" }
              - { name: "date_am", label: "Datum (amhariska)", widget: "string" }
              - { name: "title_sv", label: "Titel (svenska)", widget: "string" }
              - { name: "title_am", label: "Titel (amhariska)", widget: "string" }
              - { name: "excerpt_sv", label: "Sammanfattning (svenska)", widget: "text" }
              - { name: "excerpt_am", label: "Sammanfattning (amhariska)", widget: "text" }
              - { name: "body_sv", label: "Fullständig text (svenska)", widget: "text" }
              - { name: "body_am", label: "Fullständig text (amhariska)", widget: "text" }

  - name: "gallery"
    label: "Galleri"
    files:
      - name: "gallery"
        label: "Bilder"
        file: "content/gallery.json"
        fields:
          - name: "items"
            label: "Bilder"
            widget: "list"
            summary: "{{title_sv}}"
            fields:
              - { name: "id", label: "ID (unikt, t.ex. tile-17)", widget: "string" }
              - name: "category"
                label: "Kategori"
                widget: "select"
                options:
                  - { label: "Gudstjänster", value: "gudstjanster" }
                  - { label: "Högtider", value: "hogtider" }
                  - { label: "Kör", value: "kor" }
                  - { label: "Barn & Familj", value: "barn" }
                  - { label: "Gemenskap", value: "gemenskap" }
              - { name: "title_sv", label: "Titel (svenska)", widget: "string" }
              - { name: "title_am", label: "Titel (amhariska)", widget: "string" }
              - { name: "image", label: "Bild (ladda upp här)", widget: "image", required: false }
              - { name: "emoji", label: "Emoji (används bara om ingen bild laddats upp)", widget: "string", required: false }
              - { name: "gradient", label: "Färgstil (används bara om ingen bild, t.ex. tile-1)", widget: "string", required: false }

  - name: "leadership"
    label: "Ledarskap"
    description: >
      Varje person är ett eget kort i listan nedan. Använd knappen "..." på
      ett befintligt kort och välj "Duplicate" för att snabbt lägga till
      någon BREDVID den personen (samma Grupp och samma Nivå) — ändra bara
      namn, roll och foto på kopian. För att lägga till någon UNDER en
      person i hierarkin, sätt istället Nivå ett steg högre (t.ex. 2 om
      personen ovanför har Nivå 1). Ordningen i listan styr vänster-till-
      höger-placeringen inom samma nivå — dra kort för att ändra ordning.
    files:
      - name: "leadership"
        label: "Ledare"
        file: "content/leadership.json"
        fields:
          - name: "items"
            label: "Personer"
            widget: "list"
            summary: "{{name}} ({{group}}, nivå {{tier}})"
            fields:
              - { name: "id", label: "ID (unikt, t.ex. leader-4)", widget: "string" }
              - name: "group"
                label: "Grupp"
                widget: "select"
                hint: "Vilken av de två träden personen tillhör."
                options:
                  - { label: "Präster", value: "priest" }
                  - { label: "Kyrkoförvaltning", value: "management" }
              - name: "tier"
                label: "Nivå i hierarkin"
                widget: "number"
                value_type: "int"
                min: 1
                default: 1
                hint: "1 = högst upp. Samma nivå som en annan person = de visas BREDVID varandra. Ett högre nummer (t.ex. nivåns +1) = personen visas UNDER, som en egen rad i trädet."
              - { name: "name", label: "Namn", widget: "string" }
              - { name: "role_sv", label: "Roll (svenska)", widget: "string" }
              - { name: "role_am", label: "Roll (amhariska)", widget: "string" }
              - name: "image"
                label: "Foto"
                widget: "image"
                required: false
                media_folder: "/images/leadership"
                public_folder: "/images/leadership"

  - name: "events"
    label: "Evenemang"
    files:
      - name: "events"
        label: "Kommande evenemang"
        file: "content/events.json"
        fields:
          - name: "items"
            label: "Evenemang"
            widget: "list"
            summary: "{{title_sv}} — {{date}}"
            fields:
              - { name: "id", label: "ID (unikt, t.ex. event-3)", widget: "string" }
              - { name: "date", label: "Datum", widget: "date", date_format: "YYYY-MM-DD", time_format: false }
              - { name: "title_sv", label: "Titel (svenska)", widget: "string" }
              - { name: "title_am", label: "Titel (amhariska)", widget: "string" }
              - { name: "desc_sv", label: "Beskrivning (svenska)", widget: "text" }
              - { name: "desc_am", label: "Beskrivning (amhariska)", widget: "text" }
