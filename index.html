</nav>
<div class="nav-backdrop" id="navBackdrop"></div>

<!-- 3. Hero Slider -->
<section class="hero" id="hem">

    <div class="slide active" style="background-image:url('images/hero1.png')">
      <div class="overlay"></div>
      <div class="slide-content">
        <p class="slide-quote" data-i18n-html="hero.slide1_quote"></p>
        <div class="slide-ctas">
          <a href="#om" class="btn btn-gold" data-i18n="hero.slide1_cta1"></a>
          <a href="#kontakt" class="btn btn-outline" data-i18n="hero.slide1_cta2"></a>
        </div>
      </div>
    </div>
    <div class="slide" style="background-image:url('images/hero2.png')">
      <div class="overlay"></div>
      <div class="slide-content">
        <p class="slide-quote" data-i18n-html="hero.slide2_quote"></p>
        <div class="slide-ctas">
          <a href="#gudstjanster" class="btn btn-gold" data-i18n="hero.slide2_cta1"></a>
          <a href="galleri.html" class="btn btn-outline" data-i18n="hero.slide2_cta2"></a>
        </div>
      </div>
    </div>
    <div class="slide" style="background-image:url('images/hero3.png')">
      <div class="overlay"></div>
      <div class="slide-content">
        <p class="slide-quote" data-i18n-html="hero.slide3_quote"></p>
        <div class="slide-ctas">
          <a href="#om" class="btn btn-gold" data-i18n="hero.slide3_cta1"></a>
          <a href="nyheter.html" class="btn btn-outline" data-i18n="hero.slide3_cta2"></a>
        </div>
      </div>
    </div>
  </div>
  <button class="slide-arrow prev" id="prevSlide" aria-label="Föregående bild">‹</button>
  <button class="slide-arrow next" id="nextSlide" aria-label="Nästa bild">›</button>
  <div class="slide-dots" id="slideDots">
    <button class="dot active" data-slide="0" aria-label="Bild 1"></button>
    <button class="dot" data-slide="1" aria-label="Bild 2"></button>
    <button class="dot" data-slide="2" aria-label="Bild 3"></button>

    <h4 data-i18n="hero.info_title"></h4>
    <p data-i18n="hero.info_line1"></p>
    <p data-i18n="hero.info_line2"></p>

<!-- 4. News Section (preview) -->
<section class="news-section" id="nyheter">
  <div class="container">
    <h2 class="section-title" data-i18n="news.section_title"></h2>
    <p class="section-sub" data-i18n="news.section_sub"></p>

    <div class="news-grid">
      <div class="news-feed">
        <div id="newsFeedList"><!-- rendered from content/news.json by main.js --></div>
        <a href="nyheter.html" class="btn btn-gold see-all-btn" data-i18n="news.see_all_btn"></a>
      </div>

      <aside class="news-sidebar">
        <div class="sidebar-card">
          <h4 data-i18n="sidebar.social_title"></h4>
          <a class="btn-social instagram block" href="https://instagram.com/ÄNDRA_TILL_ER_PROFIL" target="_blank" rel="noopener" data-i18n="sidebar.instagram"></a>
          <a class="btn-social tiktok block" href="https://tiktok.com/@ÄNDRA_TILL_ER_PROFIL" target="_blank" rel="noopener" data-i18n="sidebar.tiktok"></a>
        </div>

        <div class="sidebar-card">
          <h4 data-i18n="sidebar.sched_title"></h4>
          <p data-i18n="sidebar.sched_sun"></p>
          <p data-i18n="sidebar.sched_sat"></p>
        </div>

        <div class="sidebar-card events-shortcut-card">
          <h4 data-i18n="sidebar.events_title"></h4>
          <div id="sidebarEventsList"><!-- rendered from content/events.json by main.js --></div>
          <a href="evenemang.html" id="sidebarEventsLink" class="sidebar-link" data-i18n="sidebar.events_see_all"></a>
        </div>

        <div class="sidebar-card">
          <h4 data-i18n="sidebar.contact_title"></h4>
          <p>📍 <span data-i18n="topbar.address"></span></p>
          <p>✉ <span data-i18n="topbar.email"></span></p>
          <p>☎ <span data-i18n="topbar.phone"></span></p>
        </div>

        <div class="sidebar-card faq-card">
          <h4 data-i18n="sidebar.faq_title"></h4>
          <div class="faq-item">
            <button class="faq-q" data-i18n="sidebar.faq_q1"></button>
            <div class="faq-a"><p data-i18n="sidebar.faq_a1"></p></div>
          </div>
          <div class="faq-item">
            <button class="faq-q" data-i18n="sidebar.faq_q2"></button>
            <div class="faq-a"><p data-i18n="sidebar.faq_a2"></p></div>
          </div>
          <div class="faq-item">
            <button class="faq-q" data-i18n="sidebar.faq_q3"></button>
            <div class="faq-a"><p data-i18n="sidebar.faq_a3"></p></div>
          </div>
        </div>
      </aside>
    </div>
  </div>
</section>

<!-- 5. Schedule Section (calendar first) -->
<section class="schedule-section" id="gudstjanster">
  <div class="container">
    <h2 class="section-title" data-i18n="schedule.section_title"></h2>

    <div class="sched-tabs">
      <button class="sched-tab-btn active" data-sched-tab="hogtider" data-i18n="schedule.tab_hogtider"></button>
      <button class="sched-tab-btn" data-sched-tab="ordinarie" data-i18n="schedule.tab_ordinarie"></button>
    </div>

    <div class="sched-panel active" data-sched-panel="hogtider">
      <div class="eo-calendar" id="eoCalendar">
        <div class="eo-cal-banner">
          <h3 data-i18n="calendar.heading"></h3>
          <p class="eo-cal-today-pill">
            <span data-i18n="calendar.today_prefix"></span> <span id="eoCalTodayLabel"></span>
          </p>
        </div>

        <div class="eo-cal-controls">
          <button type="button" id="eoCalPrev" class="eo-cal-nav">‹ <span data-i18n="calendar.prev"></span></button>
          <div class="eo-cal-select-group">
            <select id="eoCalMonthSelect"></select>
            <input type="number" id="eoCalYearInput" class="eo-cal-year-input">
          </div>
          <button type="button" id="eoCalNext" class="eo-cal-nav"><span data-i18n="calendar.next"></span> ›</button>
          <button type="button" id="eoCalTodayBtn" class="eo-cal-today-btn">📅 <span data-i18n="calendar.today_btn"></span></button>
        </div>

        <div class="eo-cal-weekdays" id="eoCalWeekdays"></div>
        <div class="eo-cal-grid" id="eoCalGrid"></div>

        <div class="eo-cal-legend">
          <span class="legend-item"><i class="legend-swatch swatch-today"></i><span data-i18n="calendar.legend_today"></span></span>
          <span class="legend-item"><i class="legend-swatch swatch-sunday"></i><span data-i18n="calendar.legend_sunday"></span></span>
          <span class="legend-item"><i class="legend-swatch swatch-feast"></i><span data-i18n="calendar.legend_feast"></span></span>
          <span class="legend-item"><i class="legend-swatch swatch-fasting"></i><span data-i18n="calendar.legend_fasting"></span></span>
        </div>
      </div>
      <p class="location-note" data-i18n="calendar.disclaimer"></p>
    </div>

    <div class="sched-panel" data-sched-panel="ordinarie">
      <div class="table-wrap">
        <table class="sched-table">
          <thead>
            <tr>
              <th data-i18n="schedule.th_dag"></th>
              <th data-i18n="schedule.th_tid"></th>
              <th data-i18n="schedule.th_gudstjanst"></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td data-i18n="schedule.row_sun_day"></td>
              <td data-i18n="schedule.row_sun_time"></td>
              <td data-i18n="schedule.row_sun_service"></td>
            </tr>
            <tr>
              <td data-i18n="schedule.row_sat_day"></td>
              <td data-i18n="schedule.row_sat_time"></td>
              <td data-i18n="schedule.row_sat_service"></td>
            </tr>
          </tbody>
        </table>
      </div>
      <p class="location-note" data-i18n="schedule.location_note"></p>
    </div>
  </div>
</section>

<!-- 6. Counter Strip -->
<section class="counter-strip">
  <div class="container counters-grid">
    <div class="counter-item">
      <span class="counter-num" data-target="1965">0</span>
      <span class="counter-label" data-i18n="counters.grundad_label"></span>
    </div>
    <div class="counter-item">
      <span class="counter-num" data-target="500">0</span>
      <span class="counter-label" data-i18n="counters.medlemmar_label"></span>
    </div>
    <div class="counter-item">
      <span class="counter-num" data-target="52">0</span>
      <span class="counter-label" data-i18n="counters.gudstjanster_label"></span>
    </div>
    <div class="counter-item">
      <span class="counter-num" data-target="3">0</span>
      <span class="counter-label" data-i18n="counters.tjanster_label"></span>
    </div>
  </div>
</section>

<!-- 7. Gallery Section (preview) -->
<section class="gallery-section" id="galleri">
  <div class="container">
    <h2 class="section-title" data-i18n="gallery.section_title"></h2>

    <div class="gallery-grid gallery-grid-preview"><!-- rendered from content/gallery.json by main.js --></div>
    <div class="gallery-preview-cta">
      <a href="galleri.html" class="btn btn-gold" data-i18n="gallery.see_all_btn"></a>
    </div>
  </div>
</section>

<!-- 8. About Section -->
<section class="about-section" id="om">
  <div class="container">
    <h2 class="section-title" data-i18n="about.section_title"></h2>

    <div class="about-intro">
      <div class="intro-col">
        <h3 data-i18n="about.vision_title"></h3>
        <p data-i18n="about.vision_text"></p>
      </div>
      <div class="intro-col">
        <h3 data-i18n="about.uppdrag_title"></h3>
        <p data-i18n="about.uppdrag_text"></p>
      </div>
      <div class="intro-col">
        <h3 data-i18n="about.kyrka_title"></h3>
        <p data-i18n="about.kyrka_text"></p>
      </div>
    </div>

    <div class="about-tabs">
      <div class="tab-buttons">
        <button class="tab-btn active" data-tab="vision" data-i18n="about.tab_vision"></button>
        <button class="tab-btn" data-tab="uppdrag" data-i18n="about.tab_uppdrag"></button>
        <button class="tab-btn" data-tab="varderingar" data-i18n="about.tab_varderingar"></button>
        <a href="ledarskap.html" class="tab-btn leadership-link" data-i18n="about.tab_ledningen"></a>
      </div>

      <div class="tab-panels">
        <div class="tab-panel active" data-panel="vision">
          <p data-i18n="about.tab_vision_content"></p>
        </div>
        <div class="tab-panel" data-panel="uppdrag">
          <p data-i18n="about.tab_uppdrag_content"></p>
        </div>
        <div class="tab-panel" data-panel="varderingar">
          <p data-i18n="about.tab_varderingar_content"></p>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- 9. Contact Section -->
<section class="contact-section" id="kontakt">
  <div class="container contact-grid">
    <div class="contact-info">
      <h2 class="section-title" data-i18n="contact.section_title"></h2>
      <h3 data-i18n="contact.address_title"></h3>
      <p data-i18n="contact.address_text"></p>
      <div class="map-embed">
        <iframe
          src="https://www.google.com/maps?q=Bergsj%C3%B6dalen+44,+415+23+G%C3%B6teborg&output=embed"
          width="100%" height="320" style="border:0"
          allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          title="Karta – Bergsjödalen 44, Göteborg"></iframe>
      </div>
    </div>

    <div class="contact-form-wrap">
      <div class="contact-tabs">
        <button class="contact-tab-btn active" data-contact-tab="allman" data-i18n="contact.tab_allman"></button>
        <button class="contact-tab-btn" data-contact-tab="bon" data-i18n="contact.tab_bon"></button>
        <button class="contact-tab-btn" data-contact-tab="sakrament" data-i18n="contact.tab_sakrament"></button>
      </div>

      <div class="contact-tab-panel active" data-contact-panel="allman">
        <h3 data-i18n="contact.form_title"></h3>
        <form id="contactForm" data-simple-form action="https://formspree.io/f/xykrnvnb" method="POST" novalidate>
          <input type="hidden" name="_subject" value="Nytt meddelande – Kontaktformulär">
          <label for="contactName" data-i18n="contact.label_name"></label>
          <input type="text" id="contactName" name="name" required>

          <label for="contactEmail" data-i18n="contact.label_email"></label>
          <input type="email" id="contactEmail" name="email" required>

          <label for="contactMessage" data-i18n="contact.label_message"></label>
          <textarea id="contactMessage" name="message" rows="5" required></textarea>

          <div class="consent-row">
            <input type="checkbox" id="contactConsent" name="consent" required>
            <label for="contactConsent"><span data-i18n="privacy.consent_label"></span> <a href="integritetspolicy.html" data-i18n="privacy.heading"></a></label>
          </div>

          <button type="submit" class="btn btn-gold" data-i18n="contact.submit_btn"></button>
          <p class="form-msg" id="formMsg" role="status"></p>
        </form>
        <p class="privacy-note" data-i18n="contact.privacy_note"></p>
      </div>

      <div class="contact-tab-panel" data-contact-panel="bon">
        <h3 data-i18n="prayer.form_title"></h3>

        <div class="prayer-fee-note">
          <p data-i18n="prayer.fee_note"></p>
          <p class="prayer-fee-number"><span data-i18n="donate.swish_label"></span> <strong id="prayerSwishNumber"></strong></p>
          <a href="#" id="prayerSwishPayBtn" class="btn btn-gold" target="_blank" rel="noopener" data-i18n="prayer.fee_pay_btn"></a>
        </div>

        <form id="prayerForm" data-simple-form action="https://formspree.io/f/xjgnazaw" method="POST" novalidate>
          <input type="hidden" name="_subject" value="Ny bönebegäran">
          <label for="prayerName" data-i18n="prayer.label_name"></label>
          <input type="text" id="prayerName" name="name" required>

          <label for="prayerEmail" data-i18n="prayer.label_email"></label>
          <input type="email" id="prayerEmail" name="email">

          <label for="prayerText" data-i18n="prayer.label_prayer"></label>
          <textarea id="prayerText" name="prayer" rows="5" required></textarea>

          <div class="consent-row">
            <input type="checkbox" id="prayerConsent" name="consent" required>
            <label for="prayerConsent"><span data-i18n="privacy.consent_label"></span> <a href="integritetspolicy.html" data-i18n="privacy.heading"></a></label>
          </div>

          <button type="submit" class="btn btn-gold" data-i18n="prayer.submit_btn"></button>
          <p class="form-msg"></p>
        </form>
      </div>

      <div class="contact-tab-panel" data-contact-panel="sakrament">
        <h3 data-i18n="sacrament.form_title"></h3>
        <form id="sacramentForm" data-simple-form action="https://formspree.io/f/xykrnvnb" method="POST" novalidate>
          <input type="hidden" name="_subject" value="Ny sakramentsförfrågan">
          <label for="sacramentType" data-i18n="sacrament.label_type"></label>
          <select id="sacramentType" name="type" required>
            <option value="dop" data-i18n="sacrament.opt_dop"></option>
            <option value="vigsel" data-i18n="sacrament.opt_vigsel"></option>
            <option value="begravning" data-i18n="sacrament.opt_begravning"></option>
          </select>

          <label for="sacramentName" data-i18n="sacrament.label_name"></label>
          <input type="text" id="sacramentName" name="name" required>

          <label for="sacramentEmail" data-i18n="sacrament.label_email"></label>
          <input type="email" id="sacramentEmail" name="email" required>

          <label for="sacramentPhone" data-i18n="sacrament.label_phone"></label>
          <input type="tel" id="sacramentPhone" name="phone" required>

          <label for="sacramentDate" data-i18n="sacrament.label_date"></label>
          <input type="text" id="sacramentDate" name="date">

          <label for="sacramentMessage" data-i18n="sacrament.label_message"></label>
          <textarea id="sacramentMessage" name="message" rows="4"></textarea>

          <div class="consent-row">
            <input type="checkbox" id="sacramentConsent" name="consent" required>
            <label for="sacramentConsent"><span data-i18n="privacy.consent_label"></span> <a href="integritetspolicy.html" data-i18n="privacy.heading"></a></label>
          </div>

          <button type="submit" class="btn btn-gold" data-i18n="sacrament.submit_btn"></button>
          <p class="form-msg"></p>
        </form>
      </div>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-inner">
    <p data-i18n="footer.copyright"></p>
    <div class="footer-social">

<button id="scrollTopBtn" class="scroll-top-btn" aria-label="Till toppen">↑</button>

<div class="modal-overlay" id="eoDayModal">
  <div class="modal-box">
    <h3 id="eoDayModalTitle"></h3>
    <p id="eoDayModalGreg" class="eo-day-modal-greg"></p>
    <p id="eoDayModalFeast" class="eo-day-modal-feast"></p>

      <button type="button" id="eoDayModalClose" data-i18n="calendar.close_btn"></button>
    </div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="main.js"></script>
