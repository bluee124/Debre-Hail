          <a href="#kontakt" class="btn btn-outline" data-i18n="hero.slide1_cta2"></a>

      <h3 data-i18n="contact.form_title"></h3>
      <form id="contactForm" novalidate>
        <label for="contactName" data-i18n="contact.label_name"></label>
        <input type="text" id="contactName" name="name" required>

        <label for="contactEmail" data-i18n="contact.label_email"></label>
        <input type="email" id="contactEmail" name="email" required>

        <label for="contactMessage" data-i18n="contact.label_message"></label>
        <textarea id="contactMessage" name="message" rows="5" required></textarea>

        <button type="submit" class="btn btn-gold" data-i18n="contact.submit_btn"></button>
        <p class="form-msg" id="formMsg" role="status"></p>
      </form>
      <p class="privacy-note" data-i18n="contact.privacy_note"></p>
    </div>
  </div>
</section>

<!-- 10. Footer -->
<footer class="site-footer">
  <div class="container footer-inner">
    <p data-i18n="footer.copyright"></p>
    <div class="footer-social">
      <a class="btn-social instagram" href="https://instagram.com/ÄNDRA_TILL_ER_PROFIL" target="_blank" rel="noopener">Instagram</a>
      <a class="btn-social tiktok" href="https://tiktok.com/@ÄNDRA_TILL_ER_PROFIL" target="_blank" rel="noopener">TikTok</a>
    </div>
  </div>
</footer>

<!-- 11. Scroll to top -->
<button id="scrollTopBtn" class="scroll-top-btn" aria-label="Till toppen">↑</button>

<!-- Leadership "add person" modal -->
<div class="modal-overlay" id="leadershipModal">
  <div class="modal-box">
    <h3 data-i18n="modal.title"></h3>
    <label for="modalNameInput" data-i18n="modal.label_name"></label>
    <input type="text" id="modalNameInput">
    <label for="modalRoleInput" data-i18n="modal.label_role"></label>
    <input type="text" id="modalRoleInput">
    <label for="modalIconSelect" data-i18n="modal.label_icon"></label>
    <select id="modalIconSelect">
      <option value="🙏">🙏</option>
      <option value="✝️">✝️</option>
      <option value="🎵">🎵</option>
      <option value="📖">📖</option>
      <option value="🕯️">🕯️</option>
      <option value="👤">👤</option>
    </select>
    <div class="modal-actions">
      <button type="button" id="modalCancelBtn" data-i18n="modal.cancel_btn"></button>
      <button type="button" id="modalSaveBtn" data-i18n="modal.save_btn"></button>
    </div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="main.js"></script>
</body>
</html>
